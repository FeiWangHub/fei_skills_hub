name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_call:

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode review
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_PERMISSION: '{"bash": "deny"}'
        with:
          model: opencode/minimax-m2.5-free
          prompt: |
            Review this pull request focusing on the changed code. Identify issues related to:
            - Code quality and best practices
            - Potential bugs and edge cases
            - Security vulnerabilities
            - Performance concerns
            - Markdown/YAML/shell script correctness

            This is a skills repository — skills are Markdown-based prompt definitions with optional scripts.
            Review accordingly: check prompt clarity, template completeness, script safety, and documentation quality.

            Report only the issues found. Do not include general praise or restatements of what the code does.
